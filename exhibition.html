<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Magna — Exhibition View</title>

    <link rel="icon" href="assets/icons/favicon.ico" sizes="any">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://magnaleite.com/exhibition.html">

    <style>
      :root{ --bg:#fff; --fg:#0f172a; --muted:#64748b; --line:rgba(15,23,42,.12); }
      body{font-family:Inter,sans-serif;color:var(--fg);background:var(--bg)}
      h1,h2,h3,h4{font-family:'Playfair Display', serif;}
      
      .container{max-width:1152px;margin:0 auto;padding:0 1rem}

      /* Estilo de erro para debug visual */
      .img-error {
          padding: 2rem; background: #fee2e2; color: #991b1b;
          font-size: 0.75rem; text-align: center; border: 1px dashed #ef4444;
          width: 100%; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      
      /* Grids */
      .gallery-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-top: 2rem; }
      @media(min-width: 768px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

      .art-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
      @media(min-width: 768px) { .art-grid { grid-template-columns: repeat(4, 1fr); } }
      
      img { transition: transform 0.3s ease; }
    </style>
  </head>
  <body class="pb-20 bg-gray-50">

    <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur border-b border-gray-100 transition-all duration-300">
      <div class="container py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-black transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            <span data-i18n="backHome">Back to Home</span>
        </a>
        <select id="langSwitcher" class="text-xs font-medium bg-gray-50 border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-black">
            <option value="en">EN</option>
            <option value="pt">PT</option>
            <option value="es">ES</option>
        </select>
      </div>
    </header>

    <main id="mainContent" class="opacity-0 transition-opacity duration-500 pt-16">
        
        <section class="relative w-full bg-gray-900 py-10 md:py-12 flex flex-col items-center justify-center min-h-[60vh]">
            <div class="container relative z-10 flex flex-col items-center">
                <img id="heroImage" src="" class="shadow-2xl rounded-sm max-h-[70vh] w-auto max-w-full object-contain mb-8" alt="Exhibition Cover">
                <div class="text-center text-white max-w-2xl mt-4">
                    <p id="exhibDate" class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2"></p>
                    <h1 id="exhibTitle" class="text-3xl md:text-5xl font-serif text-white mb-2">Loading...</h1>
                    <p id="exhibLocation" class="text-lg font-light text-gray-300"></p>
                </div>
            </div>
            <div id="heroError" class="hidden text-red-400 text-xs mt-4 bg-red-900/50 px-4 py-2 rounded">Erro ao carregar capa</div>
        </section>

        <section class="py-12 bg-white border-b border-gray-100">
            <div class="container max-w-3xl text-center">
                <p id="exhibDesc" class="text-lg md:text-xl text-gray-600 leading-relaxed font-light"></p>
            </div>
        </section>

        <section id="gallerySection" class="py-16 hidden">
            <div class="container">
                <div class="flex items-center justify-center mb-10 gap-4">
                    <div class="h-px bg-gray-300 w-12"></div>
                    <h3 class="text-xl font-serif text-center uppercase tracking-widest text-sm" data-i18n="viewTitle">Installation Views</h3>
                    <div class="h-px bg-gray-300 w-12"></div>
                </div>
                <div id="galleryList" class="gallery-grid"></div>
            </div>
        </section>

        <section id="artworksSection" class="py-16 bg-white hidden">
            <div class="container">
                <h3 class="text-xl font-serif mb-8 border-b pb-4 flex justify-between items-end">
                    <span data-i18n="worksTitle" class="text-2xl">Featured Artworks</span>
                    <span id="artCount" class="text-sm font-sans text-gray-400 font-normal mb-1"></span>
                </h3>
                <div id="artworksList" class="art-grid"></div>
            </div>
        </section>

    </main>

    <footer class="py-10 text-center text-xs text-gray-400 border-t mt-12 bg-white">
        &copy; 2025-2026 Magna Studio
    </footer>

    <script>
        // === CONFIGURAÇÃO DE PASTAS ===
        // Flyers are flat (one file per exhibition, no subfolder)
        const PATH_FLYERS = "assets/exhibition/flyers/";
        // Gallery photos live in a per-exhibition subfolder, named after the slug
        const PATH_GALLERY_BASE = "assets/exhibition/img/";
        const PATH_ARTWORKS = "assets/paintings/thumbnails/";
        
        const translations = {
            en: { backHome: "Back to Home", viewTitle: "Installation Views", worksTitle: "Featured Artworks" },
            pt: { backHome: "Voltar ao Início", viewTitle: "Vistas da Instalação", worksTitle: "Obras em Exposição" },
            es: { backHome: "Volver al Inicio", viewTitle: "Vistas de la Instalación", worksTitle: "Obras Expuestas" }
        };

        let currentLang = localStorage.getItem('magna_lang') || 'en';

        // === Função que constrói o caminho ===
        // 'slug' é necessário apenas para type === 'gallery' (pasta por exposição)
        function resolvePath(filename, type, slug) {
            if (!filename) return "";
            
            // Decodifica URI para evitar problemas com %20
            let clean = decodeURIComponent(filename).trim();
            
            // Se já for um caminho completo, mantém
            if(clean.toLowerCase().includes('assets/')) return clean;
            if(clean.startsWith('http')) return clean;

            // Se for apenas o nome, adiciona a pasta correta
            if (type === 'flyer') return PATH_FLYERS + clean;
            if (type === 'gallery') return PATH_GALLERY_BASE + slug + '/' + clean;
            if (type === 'artwork') return PATH_ARTWORKS + clean; 
            
            return clean;
        }

        // === Manipulador de Erro Visual (Ajuda a descobrir o nome errado) ===
        function handleImgError(img) {
            img.style.display = 'none';
            const box = document.createElement('div');
            box.className = 'img-error';
            
            // Pega o nome do arquivo que falhou
            const srcParts = img.src.split('/');
            const fileName = srcParts[srcParts.length - 1];
            const folder = srcParts[srcParts.length - 2];

            box.innerHTML = `
                <strong class="uppercase tracking-widest mb-1">Erro 404</strong>
                <span>Arquivo não encontrado</span>
                <code class="mt-2 bg-red-100 px-2 py-1 rounded text-red-800 font-mono text-xs select-all">.../${folder}/${fileName}</code>
                <p class="mt-2 text-[10px] text-red-400">Verifique a extensão (.jpg vs .jpeg) e espaços.</p>
            `;
            img.parentNode.appendChild(box);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('id');

            if(!slug) {
                window.location.href = "index.html";
                return;
            }

            let canonicalEl = document.querySelector('link[rel="canonical"]');
            if (!canonicalEl) {
                canonicalEl = document.createElement('link');
                canonicalEl.rel = 'canonical';
                document.head.appendChild(canonicalEl);
            }
            canonicalEl.href = `https://magnaleite.com/exhibition.html?id=${slug}`;

            try {
                const [exhRes, artRes] = await Promise.all([
                    fetch('exhibitions.json'),
                    fetch('artworks.json')
                ]);

                const exhibitions = await exhRes.json();
                const artworksData = await artRes.json();
                const data = exhibitions[slug];

                if(!data) throw new Error("ID não encontrado no JSON.");

                // Traduções
                const t = translations[currentLang];
                document.querySelector('[data-i18n="backHome"]').textContent = t.backHome;
                document.querySelector('[data-i18n="viewTitle"]').textContent = t.viewTitle;
                document.querySelector('[data-i18n="worksTitle"]').textContent = t.worksTitle;

                // Dados Texto
                document.getElementById('exhibTitle').textContent = data.title;
                document.getElementById('exhibDate').textContent = data.date;
                document.getElementById('exhibLocation').textContent = data.location;
                document.getElementById('exhibDesc').textContent = data.description[currentLang] || data.description['en'];

                // 1. CAPA
                const heroImg = document.getElementById('heroImage');
                heroImg.src = resolvePath(data.image, 'flyer');
                heroImg.onerror = function() {
                    this.style.display = 'none';
                    const errDiv = document.getElementById('heroError');
                    errDiv.classList.remove('hidden');
                    errDiv.innerHTML = `Capa não encontrada: <b>${this.src.split('/').pop()}</b><br>Verifique extensão (.jpg vs .jpeg)`;
                };

                // 2. GALERIA
                if(data.gallery && data.gallery.length > 0) {
                    document.getElementById('gallerySection').classList.remove('hidden');
                    const gList = document.getElementById('galleryList');
                    
                    data.gallery.forEach(imgFile => {
                        const div = document.createElement('div');
                        div.className = "gallery-item relative";
                        const src = resolvePath(imgFile, 'gallery', slug);
                        div.innerHTML = `<img src="${src}" class="w-full h-auto rounded shadow-sm hover:shadow-lg transition" loading="lazy" onerror="handleImgError(this)">`;
                        gList.appendChild(div);
                    });
                }

                // 3. OBRAS
                if(data.artworks && data.artworks.length > 0) {
                    document.getElementById('artworksSection').classList.remove('hidden');
                    const artList = document.getElementById('artworksList');
                    let count = 0;

                    data.artworks.forEach(artSlug => {
                        const cleanSlug = artSlug.toString().trim();
                        const artKey = Object.keys(artworksData).find(k => k.toLowerCase() === cleanSlug.toLowerCase());
                        
                        if(artKey) {
                            const art = artworksData[artKey];
                            count++;
                            const artSrc = resolvePath(art.image, 'artwork');
                            
                            const link = document.createElement('a');
                            link.href = `artwork.html?id=${artKey}`;
                            link.className = "art-card group block bg-gray-50 rounded p-2 hover:bg-white hover:shadow-xl transition border border-transparent hover:border-gray-100";
                            link.innerHTML = `
                                <div class="relative overflow-hidden rounded mb-3 aspect-square">
                                    <img src="${artSrc}" class="w-full h-full object-cover transform group-hover:scale-105 transition duration-500" onerror="handleImgError(this)">
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-gray-900 leading-tight group-hover:text-purple-700 transition">${art.title}</h4>
                                    <p class="text-xs text-gray-500 mt-1">${art.year}</p>
                                </div>
                            `;
                            artList.appendChild(link);
                        }
                    });
                    document.getElementById('artCount').textContent = `(${count})`;
                }

                document.getElementById('mainContent').classList.remove('opacity-0');

            } catch (err) {
                console.error(err);
                document.body.innerHTML = `<div class="flex h-screen items-center justify-center text-red-600 font-bold">Erro Fatal: ${err.message}</div>`;
            }
        });
    </script>
  </body>
</html>
