<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magna Admin — Labels (QR + Hash)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#f3f4f6; }

    :root{
      /* === Margens da Folha === */
      --page-margin: 8mm;

      /* === Tamanho Padrão da Etiqueta (Será sobrescrito pelo JS) === */
      --label-w: 70mm;
      --label-h: 35mm;

      /* === Layout da Grelha === */
      --gap: 4mm;
      --pad: 2.5mm;
      --radius: 4mm;
    }

    /* Configuração de impressão dinâmica */
    @page { size: A4; margin: var(--page-margin); }

    @media print {
      .no-print { display:none !important; }
      body { background:white; }
      .sheet { box-shadow:none !important; margin:0 !important; padding:0 !important; }
      /* Evita que uma etiqueta seja cortada entre páginas */
      .label-container { break-inside: avoid; page-break-inside: avoid; }
    }

    /* Grelha CSS baseada em milímetros físicos */
    #sheetGrid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--label-w), 1fr));
      gap: var(--gap);
      align-items: start;
    }

    /* Contentor da Etiqueta Física */
    .label-container {
      width: var(--label-w);
      height: var(--label-h);
      padding: var(--pad);
      box-sizing: border-box;
    }

    /* O conteúdo interno da etiqueta */
    .label-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 3mm;
    }

    /* Contentor do QR Code: Força ser quadrado e ocupar a altura disponível */
    .qr-wrapper {
      height: 100%;
      aspect-ratio: 1 / 1; /* Mantém quadrado */
      flex-shrink: 0;
      padding: 1mm;
      background: white;
      border: 1px solid #d1d5db; /* gray-300 */
      border-radius: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* A imagem do QR Code em si */
    .qr-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Garante bordas nítidas na impressão */
      image-rendering: pixelated;
    }
  </style>

  <style id="pageSizeStyle"></style>

  <script>
    (function() {
      const TRUST_KEY = 'magna_trust_token';
      const TRUST_EXPIRY_KEY = 'magna_trust_expiry';
      const token = localStorage.getItem(TRUST_KEY);
      const expiry = parseInt(localStorage.getItem(TRUST_EXPIRY_KEY) || '0', 10);
      const trusted = !!token && Date.now() < expiry;

      if (!trusted) {
        document.documentElement.innerHTML = `
          <head><meta charset="UTF-8"><title>Acesso Restrito</title></head>
          <body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:sans-serif;color:white;text-align:center;padding:2rem;">
            <div>
              <h1 style="font-size:1.5rem;margin-bottom:0.5rem;">Acesso Restrito</h1>
              <p style="color:#94a3b8;font-size:0.875rem;margin-bottom:1.5rem;">Esta página só pode ser acedida através do Admin Hub.</p>
              <a href="admin-hub.html" style="display:inline-block;background:white;color:black;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:bold;text-decoration:none;">← Ir para o Admin Hub</a>
            </div>
          </body>`;
      }
    })();
  </script>
</head>  
</head>

<body class="min-h-screen">
  <div class="no-print max-w-4xl mx-auto p-6">
    <div class="bg-white rounded-xl shadow p-5 border border-gray-200">
      <div class="flex items-start justify-between gap-6">
        <div>
          <a href="admin-hub.html" class="inline-block text-xs text-gray-400 hover:text-black mb-2 no-underline">← Voltar ao Admin Hub</a>
          <h1 class="text-lg font-bold">Admin Labels</h1>
          <p class="text-xs text-gray-500">
            Generate QR + Hash stickers (high-res for print) to self-adhere behind the artwork.
          </p>
        </div>

        <div class="flex flex-col gap-2 items-end">
          <div class="flex items-end gap-3">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1">
                Paper
              </label>
              <select id="paperSelect"
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white"
                onchange="setPaperSize(this.value)">
                <option value="A4" selected>A4 (210×297mm)</option>
                <option value="Letter">Letter (8.5×11")</option>
                <option value="Legal">Legal (8.5×14")</option>
                <option value="A5">A5 (148×210mm)</option>
              </select>
            </div>

            <div>
              <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1">
                Label preset
              </label>
              <select id="labelPreset"
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white"
                onchange="setLabelPreset(this.value)">
                <option value="avery_5160">Avery 5160 (63.5 × 25.4 mm)</option>
                <option value="avery_3422" selected>Avery 3422 (70 × 35 mm)</option>
                <option value="herma_4410">Herma 4410 (70 × 36 mm)</option>
                <option value="custom">Custom (mm)</option>
              </select>
            </div>

            <button onclick="window.print()"
              class="bg-black text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-800 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
              Print
            </button>
          </div>

          <div id="customLabelControls" class="hidden w-full">
            <div class="grid grid-cols-2 gap-2">
              <input id="customW" type="number" min="10" step="0.1" placeholder="Width (mm)"
                class="border border-gray-300 rounded px-2 py-1 text-xs w-full" />
              <input id="customH" type="number" min="10" step="0.1" placeholder="Height (mm)"
                class="border border-gray-300 rounded px-2 py-1 text-xs w-full" />
            </div>
            <p class="text-[10px] text-gray-400 mt-1 text-right">
              Tip: set both width & height to apply.
            </p>
          </div>
        </div>
      </div>

      <div class="grid md:grid-cols-3 gap-4 mt-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Artwork</label>
          <select id="artSelect"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white"
            onchange="buildSheet()">
            <option value="">Loading…</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Labels qty</label>
          <input id="qty" type="number" min="1" value="6"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
            oninput="buildSheet()" />
          <p class="text-[11px] text-gray-500 mt-2">Tip: 6–12 is a good batch.</p>
        </div>
      </div>

      <div class="mt-4 text-xs text-gray-500">
        QR points to: <span class="font-mono font-bold text-black">artwork.html?id=&lt;slug&gt;</span>
      </div>
    </div>
  </div>

  <div class="sheet max-w-4xl mx-auto p-6">
    <div id="sheetGrid"></div>
  </div>

  <script>
    const JSON_PATH = '../artworks.json';
    let db = null;

    // 1. Carregar Base de Dados
    async function loadDB() {
      const res = await fetch(JSON_PATH);
      if (!res.ok) throw new Error('Failed to load artworks.json');
      db = await res.json();
    }

    // 2. Preencher o Select
    function fillSelect() {
      const sel = document.getElementById('artSelect');
      sel.innerHTML = '<option value="">Select artwork…</option>';

      Object.entries(db).forEach(([slug, art]) => {
        const opt = document.createElement('option');
        opt.value = slug;
        opt.textContent = `${art.title || slug} (${slug})`;
        sel.appendChild(opt);
      });
    }

    // 3. Gerar o Link de Destino
    function getArtworkUrl(slug) {
      // Calcula o caminho base relativo (sobe um nível, pois artwork.html está na raiz)
      const base = window.location.href.replace(/\/[^\/]*$/, '/');
      return `${base}../artwork.html?id=${encodeURIComponent(slug)}`;
    }

    // 4. Gerar o HTML de UMA Etiqueta
    function labelHTML(art, slug) {
      const targetUrl = getArtworkUrl(slug);

      // Contentor principal da etiqueta (define o tamanho físico)
      const container = document.createElement('div');
      container.className = "label-container";

      // Conteúdo interno (layout flex)
      const content = document.createElement('div');
      content.className = "label-content bg-white border border-gray-200 rounded-" + getComputedStyle(document.documentElement).getPropertyValue('--radius').trim();

      // --- QR CODE (Via API para Alta Resolução) ---
      const qrWrapper = document.createElement('div');
      qrWrapper.className = "qr-wrapper";

      // Gerar URL da API: Pedimos 300x300px para garantir nitidez na impressão
      // ecc=M oferece um bom equilíbrio entre correção de erros e densidade
      const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=000000&bgcolor=FFFFFF&ecc=M&margin=0&data=${encodeURIComponent(targetUrl)}`;

      const qrImg = document.createElement('img');
      qrImg.src = qrApiUrl;
      qrImg.className = "qr-img";
      qrImg.alt = "QR Code";

      qrWrapper.appendChild(qrImg);

      // --- TEXTO (Lado Direito) ---
      const right = document.createElement('div');
      right.className = "min-w-0 flex-grow";

      const title = document.createElement('div');
      title.className = "text-xs font-bold text-gray-900 leading-tight truncate";
      title.textContent = art.title || slug;

      const hash = document.createElement('div');
      hash.className = "mt-1 text-[10px] font-mono text-gray-700 break-all leading-tight";
      hash.textContent = (art.originalHash || "Pending Registration");

      const tiny = document.createElement('div');
      tiny.className = "mt-1.5 text-[9px] text-gray-400 uppercase tracking-wider font-bold";
      tiny.textContent = "Scan to view artwork";

      right.appendChild(title);
      right.appendChild(hash);
      right.appendChild(tiny);

      // Montar a etiqueta
      content.appendChild(qrWrapper);
      content.appendChild(right);
      container.appendChild(content);

      return container;
    }

    // 5. Construir a Folha
    function buildSheet() {
      const slug = document.getElementById('artSelect').value;
      // Garante que qty é pelo menos 1 e é um número
      let qtyInput = document.getElementById('qty').value;
      let qty = parseInt(qtyInput, 10);
      if (isNaN(qty) || qty < 1) { qty = 1; document.getElementById('qty').value = 1; }

      const grid = document.getElementById('sheetGrid');
      grid.innerHTML = "";

      if (!slug || !db || !db[slug]) return;
      const art = db[slug];

      for (let i = 0; i < qty; i++) {
        grid.appendChild(labelHTML(art, slug));
      }
    }

    // === Funções de Configuração de Papel/Etiqueta ===

    function setPaperSize(sizeName) {
      const styleEl = document.getElementById('pageSizeStyle');
      const allowed = new Set(["A4","A5","Letter","Legal"]);
      const safe = allowed.has(sizeName) ? sizeName : "A4";
      styleEl.textContent = `@page { size: ${safe}; margin: var(--page-margin); }`;
    }

    const LABEL_PRESETS = {
      // Definições padrão de etiquetas comuns (em mm)
      avery_5160: { w: 63.5, h: 25.4, gap: 3, radius: 2 },
      avery_3422: { w: 70, h: 35, gap: 4, radius: 3 },
      herma_4410: { w: 70, h: 36, gap: 4, radius: 3 },
    };

    function applyLabelSize(w, h, gap, radius = 3) {
      const root = document.documentElement.style;
      root.setProperty('--label-w', `${w}mm`);
      root.setProperty('--label-h', `${h}mm`);
      root.setProperty('--gap', `${gap}mm`);
      root.setProperty('--radius', `${radius}mm`);
    }

    function setLabelPreset(preset) {
      const customBox = document.getElementById('customLabelControls');

      if (preset === 'custom') {
        customBox.classList.remove('hidden');
        return;
      }

      customBox.classList.add('hidden');

      const cfg = LABEL_PRESETS[preset];
      if (!cfg) return;

      applyLabelSize(cfg.w, cfg.h, cfg.gap, cfg.radius);
      buildSheet();
    }

    function applyCustom() {
      const w = parseFloat(document.getElementById('customW').value);
      const h = parseFloat(document.getElementById('customH').value);
      if (!w || !h || isNaN(w) || isNaN(h)) return;

      // Gap padrão de 4mm e raio de 2mm para custom
      applyLabelSize(w, h, 4, 2);
      buildSheet();
    }

    // === Inicialização ===
    (async function init() {
      await loadDB();
      fillSelect();

      // Configurações iniciais da UI
      const paper = document.getElementById('paperSelect');
      setPaperSize(paper?.value || "A4");

      const preset = document.getElementById('labelPreset');
      setLabelPreset(preset?.value || "avery_3422");

      // Listeners para input customizado
      document.getElementById('customW').addEventListener('input', applyCustom);
      document.getElementById('customH').addEventListener('input', applyCustom);
    })();
  </script>
</body>
</html>
